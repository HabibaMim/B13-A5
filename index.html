<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<style>
    *{ font-family: "Geist", sans-serif;}
</style>
</head>
<body>
    <!--login page  -->
    <section class="flex justify-center items-center min-h-screen">
    <div class="p-[32px] border-base-300 rounded-box border shadow-md w-[33%]">
    <fieldset class="fieldset ">
    <div class="flex flex-col justify-center items-center">
    <img src="./assets/github-logo.png" alt="">
    <h2 class="text-[24px] font-semibold">GitHub Issues Tracker</h2>
    <p class="text-gray-500 text-[16px]">Sign in to manage your issues</p>
    </div>

  <label class="label text-black text-[16px]">Username</label>
  <input type="text" id="username" class="input w-full outline-none" placeholder="Enter Username" />
  <p class="text-[14px] text-blue-500">Default: admin</p>

  <label class="label text-black text-[16px]">Password</label>
  <input id="password" type="password" class="input w-full outline-none" placeholder="Enter Password" />
   <p class="text-[14px] text-blue-500">Default: admin123</p>

  <button id="login-btn" class="btn bg-blue-600 text-white mt-4 text-[16px]">Sign In</button>
    </fieldset>

    <div class="text-center">
        <h2 class="py-[24px]">OR</h2>
        <p class="text-[14px] text-gray-500">Demo Credentials:</p>
        <div class="py-[24px] bg-base-200 rounded-md flex flex-col justify-center items-center">
            <p><span class="font-semibold">Username:</span> admin</p>
            <p><span class="font-semibold">Password:</span> admin123</p>
        </div>
    </div>
</div></section>

<script src="./script/script.js"></script>

</body>
</html>
